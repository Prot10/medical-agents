name: "First Unprovoked Seizure Workup (AAN Guidelines)"
description: "AAN evidence-based guideline for first unprovoked seizure evaluation. Aggressive workup with early treatment consideration if recurrence risk is high."
triggers: ["first_seizure", "new_onset_seizure", "first_epileptic_seizure"]
steps:
  - action: "interpret_labs"
    timing: "immediate"
    mandatory: true
    tests: ["CBC", "CMP", "glucose", "prolactin", "toxicology_screen", "pregnancy_test_if_applicable"]
  - action: "analyze_eeg"
    timing: "within_24h"
    mandatory: true
    note: "Routine EEG within 24h; consider continuous EEG if status epilepticus suspected"
  - action: "analyze_brain_mri"
    timing: "within_24h"
    mandatory: true
    sequences: ["T1", "T2", "FLAIR", "DWI", "contrast_if_lesion_suspected"]
    note: "Epilepsy protocol MRI preferred; CT only if MRI unavailable or emergent"
  - action: "check_drug_interactions"
    timing: "before_discharge"
    mandatory: true
    condition: "if_ASM_started"
contraindicated:
  - "Starting phenytoin without checking HLA-B*15:02 in patients of Asian descent"
  - "Discharging without driving restriction counseling and state-specific DMV reporting documentation"
  - "Starting valproate in women of childbearing age without pregnancy test, counseling, and documented contraception plan"
  - "Delaying MRI beyond 24h in adult first seizure with focal features"
