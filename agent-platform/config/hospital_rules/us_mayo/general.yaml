name: "General Neurology Rules — Mayo Clinic (USA)"
description: "AAN-aligned general safety protocols. Emphasizes documentation, liability management, and shared decision-making."
triggers: ["general", "neurology", "any"]
steps:
  - action: "interpret_labs"
    timing: "initial"
    mandatory: false
    note: "Baseline labs recommended for all new neurology patients"
  - action: "check_drug_interactions"
    timing: "before_prescribing"
    mandatory: true
    condition: "if_new_medication_prescribed"
contraindicated:
  - "Prescribing medications without checking current medication list and allergy history"
  - "Ordering MRI without screening for contraindications (pacemaker, metallic implants, pregnancy)"
  - "Discharging patients with new neurological deficits without documented follow-up plan"
  - "Starting immunosuppressive therapy without TB screening (QuantiFERON) and hepatitis panel"
  - "Initiating treatment without documenting informed consent discussion"
