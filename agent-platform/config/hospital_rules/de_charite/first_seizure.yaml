name: "Erster epileptischer Anfall — Abklärung (DGN S1 Leitlinie)"
description: "DGN guideline for first seizure. Emphasizes prolonged EEG, high-resolution MRI, and conservative approach to early ASM initiation."
triggers: ["first_seizure", "new_onset_seizure", "first_epileptic_seizure"]
steps:
  - action: "interpret_labs"
    timing: "immediate"
    mandatory: true
    tests: ["Blutbild", "Elektrolyte", "Glukose", "Prolaktin", "CK", "Leberwerte", "Nierenwerte", "Drogenscreening"]
    note: "CK elevation supports true seizure vs psychogenic. Prolactin within 20min post-ictal is most informative"
  - action: "analyze_eeg"
    timing: "within_24h"
    mandatory: true
    note: "Routine-EEG plus Schlafentzugs-EEG if initial recording normal. Consider 24h Langzeit-EEG for uncertain cases"
  - action: "analyze_brain_mri"
    timing: "within_48h"
    mandatory: true
    sequences: ["T1_3D", "T2", "FLAIR", "DWI", "T2_coronal_hippocampal"]
    note: "Epilepsie-Protokoll MRT (3T preferred) with thin coronal cuts through temporal lobes"
  - action: "check_drug_interactions"
    timing: "before_discharge"
    mandatory: true
    condition: "if_ASM_initiated"
contraindicated:
  - "Starting phenytoin without HLA-B*15:02 screening in patients of Southeast Asian descent"
  - "Discharging without Fahreignungsberatung (driving fitness counseling) — 3-6 months driving ban per FeV Anlage 4"
  - "Starting valproate in women of childbearing age without pregnancy test and contraception counseling (EMA directive)"
  - "Initiating ASM after single unprovoked seizure without discussing observation alternative (recurrence risk <50%)"
  - "Ordering only CT without MRI — CT misses up to 50% of epileptogenic lesions"
