name: "Allgemeine Neurologie-Regeln — Charité Berlin"
description: "DGN-Leitlinien-konforme allgemeine Sicherheitsprotokolle. Emphasizes thorough documentation, structured diagnostics, and Facharzt oversight."
triggers: ["general", "neurology", "any"]
steps:
  - action: "interpret_labs"
    timing: "initial"
    mandatory: false
    note: "Comprehensive baseline labs for all new admissions; outpatients receive targeted labs"
  - action: "check_drug_interactions"
    timing: "before_prescribing"
    mandatory: true
    condition: "if_new_medication_prescribed"
contraindicated:
  - "Prescribing without checking ABDA interaction database and Rote Liste"
  - "Ordering MRI without completing MRT-Sicherheitsfragebogen (MRI safety questionnaire)"
  - "Discharging without Arztbrief (discharge letter) to referring physician within 24h"
  - "Starting immunosuppressive therapy without TB QuantiFERON, hepatitis serology, and chest X-ray"
  - "Initiating off-label treatment without Aufklärung (informed consent) documenting off-label status"
