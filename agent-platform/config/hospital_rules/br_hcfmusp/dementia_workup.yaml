name: "Investigação de Demência (ABN Recomendações 2023)"
description: "ABN dementia workup recommendations. Adapted for SUS with emphasis on treatable and reversible causes prevalent in Brazil."
triggers: ["dementia", "cognitive_decline", "alzheimers", "memory_loss", "ftd", "nph"]
steps:
  - action: "interpret_labs"
    timing: "initial_visit"
    mandatory: true
    tests: ["hemograma", "TSH", "B12", "ácido_fólico", "VDRL", "anti-HIV", "glicemia", "função_renal", "função_hepática", "cálcio"]
    note: "VDRL and HIV mandatory per ABN — neurosyphilis and HIV dementia are treatable and not rare in Brazil. Consider Chagas serology if from endemic region"
  - action: "analyze_brain_mri"
    timing: "within_60d"
    mandatory: true
    note: "TC de crânio acceptable if MRI wait exceeds 60 days (common in SUS). MRI preferred for hippocampal atrophy and white matter assessment"
  - action: "check_drug_interactions"
    timing: "if_treatment_started"
    mandatory: true
    condition: "if_antidementia_medication_initiated"
contraindicated:
  - "Starting cholinesterase inhibitors without baseline ECG if cardiac history"
  - "Diagnosing Alzheimer's without excluding neurosyphilis (VDRL), B12 deficiency, hypothyroidism, NPH, and depression"
  - "Starting memantine as monotherapy in mild cognitive impairment"
  - "Prescribing donepezil above 10mg/day without specialist review (rivastigmine patch preferred per PCDT/MS if GI intolerance)"
  - "Failing to register patient in PCDT (Protocolo Clínico e Diretrizes Terapêuticas) for SUS medication dispensing"
