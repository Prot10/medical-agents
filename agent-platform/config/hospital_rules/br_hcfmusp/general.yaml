name: "Regras Gerais de Neurologia — HC-FMUSP São Paulo"
description: "ABN-aligned protocols adapted for SUS (Sistema Único de Saúde). Resource-aware approach balancing guideline adherence with practical availability."
triggers: ["general", "neurology", "any"]
steps:
  - action: "interpret_labs"
    timing: "initial"
    mandatory: false
    note: "Basic labs readily available via SUS. Advanced panels may require external lab referral"
  - action: "check_drug_interactions"
    timing: "before_prescribing"
    mandatory: true
    condition: "if_new_medication_prescribed"
contraindicated:
  - "Prescribing without checking RENAME (Relação Nacional de Medicamentos) availability and interaction profile"
  - "Ordering MRI without checking contraindications and SUS authorization (may require APAC form)"
  - "Discharging without encaminhamento (referral) to UBS or ambulatório de especialidades"
  - "Starting immunosuppressive therapy without PPD/IGRA, hepatitis B/C serology, and strongyloides screening (endemic)"
  - "Prescribing medications not on RENAME without documenting clinical justification for judicialização"
