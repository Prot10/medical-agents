name: "Primeira Crise Epiléptica — Protocolo de Investigação (ABN/LBE)"
description: "ABN guideline with Liga Brasileira de Epilepsia recommendations. Pragmatic workup adapted to SUS resource availability."
triggers: ["first_seizure", "new_onset_seizure", "first_epileptic_seizure"]
steps:
  - action: "interpret_labs"
    timing: "immediate"
    mandatory: true
    tests: ["hemograma", "eletrólitos", "glicemia", "cálcio", "magnésio", "função_renal", "função_hepática", "toxicológico"]
    note: "Prolactin not routinely available in SUS emergency departments — clinical differentiation preferred"
  - action: "analyze_eeg"
    timing: "within_7d"
    mandatory: true
    note: "EEG wait times in SUS can be 1-4 weeks. Prioritize if focal features or abnormal exam. Sleep-deprived EEG if first is normal"
  - action: "analyze_brain_mri"
    timing: "within_30d"
    mandatory: true
    note: "MRI preferred but CT acceptable if MRI wait time exceeds 30 days (common in SUS). CT STAT if focal deficit, persistent confusion, or fever"
  - action: "check_drug_interactions"
    timing: "before_discharge"
    mandatory: true
    condition: "if_ASM_initiated"
contraindicated:
  - "Discharging without orientação sobre restrição de direção (CONTRAN Resolution 425 — must be seizure-free per Detran evaluation)"
  - "Starting phenobarbital as first-line in young adults despite SUS availability — levetiracetam and carbamazepine preferred per ABN (phenobarbital acceptable if cost/access is the only barrier)"
  - "Starting valproate in women of childbearing age without pregnancy test and contraception counseling"
  - "Ordering only CT when MRI is available — CT misses many epileptogenic lesions, especially mesial temporal sclerosis"
  - "Delaying neurology referral beyond 30 days — SISREG priority should be requested"
