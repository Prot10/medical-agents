name: "General Neurology Rules — NHS England"
description: "NICE-aligned general protocols. Emphasizes cost-effectiveness, structured referral pathways, and DVLA notification requirements."
triggers: ["general", "neurology", "any"]
steps:
  - action: "interpret_labs"
    timing: "initial"
    mandatory: false
    note: "Targeted labs based on clinical presentation; avoid blanket screening"
  - action: "check_drug_interactions"
    timing: "before_prescribing"
    mandatory: true
    condition: "if_new_medication_prescribed"
contraindicated:
  - "Prescribing without checking the Summary of Product Characteristics (SmPC) and BNF interactions"
  - "Ordering MRI without checking MRI safety questionnaire (pacemaker, metallic implants)"
  - "Discharging without documented safety-netting advice and GP letter"
  - "Starting biologic or immunosuppressive therapy without TB screening and hepatitis serology"
  - "Requesting investigations that duplicate recent results within 3 months without clinical justification"
