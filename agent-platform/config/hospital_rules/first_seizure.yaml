name: "First Unprovoked Seizure Workup"
description: "Standard workup for patients presenting with a first unprovoked seizure"
triggers: ["first_seizure", "new_onset_seizure", "first_epileptic_seizure"]
steps:
  - action: "interpret_labs"
    timing: "immediate"
    mandatory: true
    tests: ["CBC", "BMP", "glucose", "prolactin", "toxicology"]
  - action: "analyze_eeg"
    timing: "within_24h"
    mandatory: true
  - action: "analyze_brain_mri"
    timing: "within_7d"
    mandatory: true
    sequences: ["T1", "T2", "FLAIR", "DWI"]
  - action: "check_drug_interactions"
    timing: "before_discharge"
    mandatory: true
    condition: "if_aed_started"
  - action: "search_medical_literature"
    timing: "as_needed"
    mandatory: false
contraindicated:
  - "Starting phenytoin without checking HLA-B*15:02 in patients of Asian descent"
  - "Discharging without driving restriction counseling"
  - "Starting valproate in women of childbearing age without pregnancy test and counseling"
