name: "General Neurology Rules"
description: "General clinical rules and safety checks applicable to all neurology patients"
triggers: ["general", "neurology", "any"]
steps:
  - action: "interpret_labs"
    timing: "initial"
    mandatory: false
    note: "Basic labs recommended for all new neurology patients"
  - action: "check_drug_interactions"
    timing: "before_prescribing"
    mandatory: true
    condition: "if_new_medication_prescribed"
contraindicated:
  - "Prescribing medications without checking current medication list for interactions"
  - "Ordering MRI without screening for contraindications (pacemaker, metallic implants)"
  - "Discharging patients with new neurological deficits without clear follow-up plan"
  - "Starting immunosuppressive therapy without screening for infections (TB, hepatitis)"
