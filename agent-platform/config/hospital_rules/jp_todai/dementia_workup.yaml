name: "認知症精査プロトコル (日本神経学会ガイドライン 2017)"
description: "JSN dementia guideline. Comprehensive approach with neuropsychological battery, emphasis on treatable dementias, and family-centered care."
triggers: ["dementia", "cognitive_decline", "alzheimers", "memory_loss", "ftd", "nph"]
steps:
  - action: "interpret_labs"
    timing: "initial_visit"
    mandatory: true
    tests: ["CBC", "electrolytes", "glucose", "TSH", "FT4", "B12", "folate", "TPHA", "hepatic_panel", "renal_panel", "ammonia"]
    note: "TPHA (syphilis) still recommended in JSN guideline. Ammonia for hepatic encephalopathy screening"
  - action: "analyze_brain_mri"
    timing: "within_4_weeks"
    mandatory: true
    sequences: ["T1_volumetric", "T2", "FLAIR", "SWI", "coronal_hippocampal"]
    note: "VSRAD (Voxel-Based Specific Regional Analysis System for Alzheimer's Disease) analysis recommended for hippocampal atrophy quantification. Widely available in Japanese hospitals"
  - action: "check_drug_interactions"
    timing: "if_treatment_started"
    mandatory: true
    condition: "if_antidementia_medication_initiated"
contraindicated:
  - "Starting cholinesterase inhibitors without baseline ECG — risk of bradycardia, especially with donepezil"
  - "Diagnosing Alzheimer's without excluding treatable causes (B12, TSH, NPH, chronic subdural hematoma, depression)"
  - "Starting memantine as monotherapy in MCI (not approved for MCI in Japan)"
  - "Prescribing antipsychotics for BPSD without yokukansan (抑肝散) trial first — first-line for agitation/aggression per Japanese guideline"
  - "Initiating donepezil at full dose — must titrate from 3mg to 5mg over 1-2 weeks per Japanese prescribing guidelines"
