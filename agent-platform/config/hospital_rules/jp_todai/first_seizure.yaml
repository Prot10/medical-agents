name: "初回非誘発性てんかん発作精査 (JES ガイドライン)"
description: "Japan Epilepsy Society guideline for first seizure. Conservative approach — observation often preferred over immediate ASM unless high recurrence risk."
triggers: ["first_seizure", "new_onset_seizure", "first_epileptic_seizure"]
steps:
  - action: "interpret_labs"
    timing: "immediate"
    mandatory: true
    tests: ["CBC", "electrolytes", "glucose", "ammonia", "prolactin", "CK", "hepatic_panel", "renal_panel"]
    note: "Ammonia included per JES — hyperammonemia can cause seizures and is treatable"
  - action: "analyze_eeg"
    timing: "within_24h"
    mandatory: true
    note: "Standard EEG plus photic stimulation and hyperventilation. Sleep-deprived EEG recommended if initial normal. Video-EEG for uncertain cases"
  - action: "analyze_brain_mri"
    timing: "within_7d"
    mandatory: true
    sequences: ["T1", "T2", "FLAIR", "DWI", "coronal_FLAIR_hippocampal"]
    note: "3T MRI with epilepsy protocol preferred. 1.5T acceptable if 3T not available"
  - action: "check_drug_interactions"
    timing: "before_discharge"
    mandatory: true
    condition: "if_ASM_initiated"
contraindicated:
  - "Starting phenytoin without HLA-A*31:01 screening in Japanese patients (high risk of DRESS/SJS)"
  - "Discharging without driving restriction counseling — 2-year seizure-free period required per Japanese Road Traffic Act (道交法)"
  - "Starting valproate in women of childbearing age without pregnancy test and informed consent about teratogenicity"
  - "Initiating ASM after single unprovoked seizure without multi-disciplinary conference (カンファレンス) discussion of observation vs treatment"
  - "Starting carbamazepine without HLA-B*15:02 screening in Japanese patients"
