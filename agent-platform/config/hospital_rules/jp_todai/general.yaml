name: "一般神経内科規則 — 東京大学病院"
description: "JSN-aligned general neurology protocols. Emphasizes consensus-based decision making, careful documentation, and family involvement."
triggers: ["general", "neurology", "any"]
steps:
  - action: "interpret_labs"
    timing: "initial"
    mandatory: false
    note: "Comprehensive baseline labs standard for all admissions in Japanese hospital practice"
  - action: "check_drug_interactions"
    timing: "before_prescribing"
    mandatory: true
    condition: "if_new_medication_prescribed"
contraindicated:
  - "Prescribing without checking interactions via hospital formulary system (医薬品情報)"
  - "Ordering MRI without completing MRI safety checklist (ペースメーカー、金属インプラント確認)"
  - "Discharging without 紹介状 (referral letter) to primary care physician"
  - "Starting immunosuppressive therapy without screening for TB (T-SPOT or QFT), HBV, and chest X-ray"
  - "Prescribing opioids beyond acute phase without pain specialist consultation (麻薬適正使用)"
