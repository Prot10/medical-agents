name: "急性期脳卒中プロトコル (JSS ガイドライン 2021)"
description: "Japan Stroke Society guideline. Lower IV alteplase dose (0.6 mg/kg per J-MARS), mandatory stroke care unit, comprehensive secondary prevention."
triggers: ["stroke", "stroke_code", "acute_stroke", "ischemic_stroke", "hemorrhagic_stroke", "tia"]
steps:
  - action: "interpret_labs"
    timing: "immediate"
    mandatory: true
    tests: ["CBC", "coagulation", "electrolytes", "glucose", "renal_panel", "troponin", "BNP", "HbA1c", "lipids"]
    note: "BNP for cardiogenic stroke screening; comprehensive metabolic workup standard"
  - action: "analyze_brain_mri"
    timing: "immediate"
    mandatory: true
    note: "CT STAT. MRI-DWI within 6h strongly recommended — Japanese centers have high MRI availability. MRA of cervical and intracranial vessels mandatory"
  - action: "analyze_ecg"
    timing: "immediate"
    mandatory: true
    note: "12-lead ECG immediately. Holter monitoring for 7-14 days recommended per JSS (longer than Western guidelines) for AF detection"
  - action: "check_drug_interactions"
    timing: "before_treatment"
    mandatory: true
    condition: "if_thrombolysis_or_anticoagulation"
contraindicated:
  - "Administering IV alteplase at standard Western dose (0.9 mg/kg) — Japan uses 0.6 mg/kg per J-MARS/SITS-MOST evidence"
  - "Administering IV alteplase beyond 4.5h from onset without perfusion mismatch evidence"
  - "Anticoagulation in acute hemorrhagic stroke"
  - "Discharging without comprehensive secondary prevention plan (antiplatelet/anticoagulant, statin, BP control, lifestyle modification)"
  - "Not considering edaravone (ラジカット) for neuroprotection within 24h of onset (approved in Japan)"
