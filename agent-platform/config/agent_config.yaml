# NeuroAgent Configuration

llm:
  base_url: "http://localhost:8000/v1"  # vLLM endpoint
  api_key: "not-needed"
  model: "Qwen/Qwen3.5-9B"
  # Qwen3.5 recommended sampling params for reasoning with thinking mode:
  temperature: 1.0
  max_tokens: 8192
  top_p: 0.95
  presence_penalty: 1.5

agent:
  max_turns: 15
  enable_reflection: true
  enable_memory: true
  enable_rules: true

judge:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0

memory:
  db_path: "./data/patient_memory"
  max_encounters: 5

rules:
  rules_dir: "config/hospital_rules"
  hospital: "us_mayo"  # Options: us_mayo, uk_nhs, de_charite, jp_todai, br_hcfmusp

evaluation:
  dataset_path: "./data/neurobench_v1"
  output_dir: "./results"
  splits: ["test"]
