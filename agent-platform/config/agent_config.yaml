# NeuroAgent Configuration

llm:
  base_url: "http://localhost:8000/v1"  # vLLM endpoint
  api_key: "not-needed"
  model: "QuantTrio/Qwen3.5-27B-AWQ"
  temperature: 0.0
  max_tokens: 4096

agent:
  max_turns: 15
  enable_reflection: true
  enable_memory: true
  enable_rules: true

judge:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0

memory:
  db_path: "./data/patient_memory"
  max_encounters: 5

rules:
  rules_dir: "config/hospital_rules"

evaluation:
  dataset_path: "./data/neurobench_v1"
  output_dir: "./results"
  splits: ["test"]
