# Real-world USD cost estimates for diagnostic tests.
# Sources: GoodRx, Sidecar Health, CostHelper (2024-2025 averages).
# Used as relative weights in the cost-aware reward function.

tool_costs:
  analyze_brain_mri: 2500    # Brain MRI with/without contrast
  analyze_eeg: 800           # Routine EEG (30-60 min)
  analyze_csf: 1500          # Lumbar puncture + CSF analysis + special tests
  analyze_ecg: 150           # 12-lead ECG
  interpret_labs: 300         # Standard lab panels (CBC, BMP, LFTs, TSH)
  search_medical_literature: 0   # No patient cost
  check_drug_interactions: 0     # No patient cost

# Normalized relative weights (MRI = 1.0)
relative_weights:
  analyze_brain_mri: 1.00
  analyze_eeg: 0.32
  analyze_csf: 0.60
  analyze_ecg: 0.06
  interpret_labs: 0.12
  search_medical_literature: 0.00
  check_drug_interactions: 0.00
