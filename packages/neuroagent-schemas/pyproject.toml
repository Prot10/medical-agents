[project]
name = "neuroagent-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas for NeuroAgent and NeuroBench"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neuroagent_schemas"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
